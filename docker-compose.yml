services:
  postgres:
    image: postgres:16-alpine
    container_name: djs-postgres
    restart: always
    environment:
      POSTGRES_USER: djs_user
      POSTGRES_PASSWORD: djs_pass
      POSTGRES_DB: djs_db
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djs_user -d djs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: djs-redis
    restart: always
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
